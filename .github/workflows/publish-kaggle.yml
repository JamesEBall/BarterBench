name: Publish to Kaggle

on:
  push:
    branches: [main]
    paths:
      - "results.json"
      - "bt_ratings.json"
      - "elo_ratings.json"
      - "scenarios/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install kaggle

      - name: Publish to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: python3 scripts/publish_kaggle.py
