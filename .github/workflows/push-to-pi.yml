name: Push environment to Prime Intellect Hub

on:
  push:
    branches: [main]
    paths:
      - "environments/**"

jobs:
  push-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install prime CLI
        run: uv tool install -U prime

      - name: Authenticate prime CLI
        run: prime config set-api-key ${{ secrets.PRIME_API_KEY }}

      - name: Push barterbench environment
        working-directory: environments/barterbench
        run: prime env push --yes
