<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarterBench</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #ffffff;
  --surface: #f9fafb;
  --surface2: #f3f4f6;
  --border: #e5e7eb;
  --border-light: #f0f0f0;
  --text: #111827;
  --text2: #6b7280;
  --text3: #9ca3af;
  --accent: #111827;
  --blue: #2563eb;
  --purple: #7c3aed;
  --green: #059669;
  --red: #dc2626;
  --amber: #d97706;
  --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', ui-monospace, monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 2rem 2.5rem;
}

.header {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  margin-bottom: 0.25rem;
}
.header h1 {
  font-size: 1.25rem;
  font-weight: 600;
  letter-spacing: -0.03em;
  color: var(--text);
}
.header .version {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
  border: 1px solid var(--border);
  padding: 0.1rem 0.4rem;
  border-radius: 4px;
}
.subtitle {
  color: var(--text2);
  font-size: 0.8rem;
  margin-bottom: 1.75rem;
}

.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.5rem;
}
.tab {
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 0.6rem 1.25rem;
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  position: relative;
  letter-spacing: 0.02em;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: var(--text);
}
.tab-content { display: none; }
.tab-content.active { display: block; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
}
.card-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  margin-bottom: 0.75rem;
}

.filters {
  display: flex;
  gap: 0.35rem;
  margin-bottom: 0.75rem;
  flex-wrap: wrap;
}
.filter-btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 0.2rem 0.6rem;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--text3); color: var(--text); }
.filter-btn.active {
  background: var(--accent);
  color: #ffffff;
  border-color: var(--accent);
}

svg { width: 100%; display: block; }
svg text { font-family: var(--mono); }

table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.75rem;
}
th {
  text-align: left;
  font-weight: 500;
  color: var(--text3);
  padding: 0.4rem 0.6rem;
  border-bottom: 1px solid var(--border);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
th.r, td.r { text-align: right; }
td {
  padding: 0.45rem 0.6rem;
  border-bottom: 1px solid var(--border-light);
  color: var(--text);
}
tr:hover td { background: var(--surface2); }
tr.clickable { cursor: pointer; }
tr.clickable:hover td { background: #e5e7eb; }

.tag {
  display: inline-block;
  padding: 0.1rem 0.45rem;
  border-radius: 4px;
  font-size: 0.7rem;
}

.stats-row {
  display: flex;
  gap: 1rem;
  margin-bottom: 1rem;
}
.stat-card {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}
.stat-card .val {
  font-family: var(--mono);
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: -0.03em;
}
.stat-card .lbl {
  font-size: 0.7rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 0.15rem;
}

/* Replay */
.arena {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
}

.agents-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1.25rem;
}
.agent-card {
  text-align: center;
  padding: 0.6rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
}
.agent-card .sprite {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin: 0 auto 0.3rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.25rem;
  border: 2px solid var(--border);
}
.agent-card .agent-name {
  font-weight: 600;
  font-size: 0.7rem;
  margin-bottom: 0.1rem;
}
.agent-card .agent-model {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--text2);
}
.agent-card .agent-strat {
  font-family: var(--mono);
  font-size: 0.55rem;
  font-weight: 600;
  margin-bottom: 0.3rem;
}
.goal-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 0.2rem;
}
.goal-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}
.goal-pct {
  font-family: var(--mono);
  font-size: 0.55rem;
  color: var(--text3);
}
.inventory {
  display: flex;
  gap: 0.2rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 0.25rem;
}
.inv-item {
  font-family: var(--mono);
  font-size: 0.55rem;
  padding: 0.05rem 0.3rem;
  border-radius: 3px;
  background: var(--surface);
  border: 1px solid var(--border);
  white-space: nowrap;
  color: var(--text2);
}

.order-book {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  margin-bottom: 1rem;
  max-height: 200px;
  overflow-y: auto;
}
.ob-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 0.4rem;
}
.ob-entry {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text2);
  padding: 0.2rem 0;
  border-bottom: 1px solid var(--border-light);
}
.ob-entry:last-child { border-bottom: none; }

.replay-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 0.75rem;
}
@media (max-width: 700px) {
  .replay-split { grid-template-columns: 1fr; }
}

.event-log {
  max-height: 500px;
  overflow-y: auto;
  padding: 0.5rem 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.event {
  display: flex;
  gap: 0.5rem;
  padding: 0.35rem 0.5rem;
  margin-bottom: 0.3rem;
  border-radius: 6px;
  font-size: 0.75rem;
  opacity: 0;
  animation: fadeIn 0.25s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
.event .ev-round {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--text3);
  white-space: nowrap;
  min-width: 2.5rem;
}
.event .ev-agent {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 600;
  white-space: nowrap;
  min-width: 5rem;
}
.event .ev-action {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  white-space: nowrap;
  min-width: 4.5rem;
}
.event .ev-detail {
  font-size: 0.75rem;
  color: var(--text2);
  flex: 1;
}
.ev-post { color: var(--blue); }
.ev-accept { color: var(--green); }
.ev-pass { color: var(--text3); }
.ev-invalid { color: var(--red); }

.event { cursor: pointer; }
.event:hover { background: var(--surface2); }
.event.selected { background: var(--surface2); border: 1px solid var(--border); }

.reasoning-panel {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem 1rem;
}
.reasoning-panel .rp-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 0.4rem;
}
.reasoning-panel .rp-agent {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 600;
  margin-bottom: 0.3rem;
}
.reasoning-panel .rp-text {
  font-size: 0.75rem;
  color: var(--text2);
  line-height: 1.7;
  max-height: 500px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.reasoning-panel .rp-text p { margin: 0 0 0.5em; }
.reasoning-panel .rp-text strong { color: var(--text); }
.reasoning-panel .rp-text code {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0.1em 0.3em;
  font-family: var(--mono);
  font-size: 0.9em;
}
.reasoning-panel .rp-text ul, .reasoning-panel .rp-text ol {
  margin: 0.3em 0 0.5em 1.2em;
}
.reasoning-panel .rp-text li { margin-bottom: 0.2em; }
.reasoning-panel .rp-empty {
  color: var(--text3);
  font-style: italic;
  font-size: 0.7rem;
}

.controls {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.ctrl-btn {
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 0.35rem 0.85rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  cursor: pointer;
  color: var(--text2);
  transition: all 0.15s;
}
.ctrl-btn:hover { border-color: var(--text3); color: var(--text); }
.step-display {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
  margin-left: auto;
}

.summary-bar {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.summary-bar .s-val {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 600;
  text-align: center;
}
.summary-bar .s-lbl {
  font-size: 0.6rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  text-align: center;
}

.empty-state {
  color: var(--text3);
  text-align: center;
  padding: 3rem;
  font-size: 0.8rem;
}

.run-list {
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>BarterBench</h1>
  <span class="version">v1.0 elo</span>
</div>
<p class="subtitle">Competitive marketplace benchmark with ELO ratings</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('overview')">overview</button>
  <button class="tab" onclick="switchTab('replays')">replays</button>
</div>

<!-- ==================== OVERVIEW TAB ==================== -->
<div class="tab-content active" id="tab-overview">

<div class="stats-row" id="statsRow"></div>

<div class="card">
  <div class="card-label">goal completion over runs</div>
  <div class="filters" id="scenarioFilters"></div>
  <svg id="chart" viewBox="0 0 940 280" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div class="card">
  <div class="card-label">elo rating over time</div>
  <svg id="eloChart" viewBox="0 0 940 300" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div class="card">
  <div class="card-label">leaderboard</div>
  <table id="leaderboard"></table>
</div>

<div class="card">
  <div class="card-label">run history</div>
  <table id="history"></table>
</div>

</div>

<!-- ==================== REPLAYS TAB ==================== -->
<div class="tab-content" id="tab-replays">

<div class="run-list" id="runSelector"></div>

<div class="controls" id="replayControls">
  <button class="ctrl-btn" onclick="restart()">restart</button>
  <button class="ctrl-btn" onclick="stepBack()">back</button>
  <button class="ctrl-btn" onclick="stepForward()">step</button>
  <button class="ctrl-btn" onclick="playAll()">play</button>
  <span class="step-display" id="stepDisplay">0 / 0</span>
</div>

<div class="arena" id="arena">
  <div class="agents-grid" id="agentsGrid"></div>
  <div class="card" style="margin-bottom:0.75rem;padding:0.75rem 1rem">
    <div class="card-label">goal completion over time</div>
    <div style="position:relative;height:220px">
      <canvas id="goalChart"></canvas>
    </div>
  </div>
  <div class="order-book" id="orderBook">
    <div class="ob-label">Order Book</div>
    <div id="obEntries"><span style="color:var(--text3);font-size:0.7rem">empty</span></div>
  </div>
  <div class="replay-split">
    <div class="event-log" id="eventLog"></div>
    <div class="reasoning-panel" id="reasoningPanel">
      <div class="rp-label">Agent Reasoning</div>
      <div class="rp-agent" id="rpAgent"></div>
      <div class="rp-text" id="rpText"><span class="rp-empty">Click an event or step through the replay</span></div>
    </div>
  </div>
  <div class="summary-bar" id="summary"></div>
</div>

</div>

</div><!-- /container -->

<script>
const COLORS = { haiku: '#2563eb', sonnet: '#059669', opus: '#7c3aed' };
const ITEM_EMOJI = {
  apples:'\u{1F34E}',oranges:'\u{1F34A}',bananas:'\u{1F34C}',
  gold:'\u{1FA99}',silver:'\u{1F948}',copper:'\u{1F7E4}',
  gems:'\u{1F48E}',iron:'\u26CF\uFE0F',wood:'\u{1FAB5}',stone:'\u{1FAA8}',
  grain:'\u{1F33E}',cloth:'\u{1F9F5}',spice:'\u{1F336}\uFE0F',
  silk:'\u{1F9F5}',tea:'\u{1F375}',water:'\u{1F4A7}',
  wheat:'\u{1F33E}',tools:'\u{1F527}',
};
const AGENT_EMOJI = [
  '\u{1F9D1}\u200D\u{1F4BC}','\u{1F469}\u200D\u{1F4BC}','\u{1F468}\u200D\u{1F4BC}',
  '\u{1F9D1}\u200D\u{1F527}','\u{1F469}\u200D\u{1F527}','\u{1F468}\u200D\u{1F527}',
  '\u{1F9D1}\u200D\u{1F373}','\u{1F469}\u200D\u{1F373}','\u{1F468}\u200D\u{1F373}',
  '\u{1F9D1}\u200D\u{1F3A8}',
];
function gc(m) {
  // Check if m contains a model name for coloring
  for (const [model, color] of Object.entries(COLORS)) {
    if (m === model || m.endsWith(':' + model) || m.includes(':' + model)) return color;
  }
  // Hash-based color for strategy names
  let h = 0;
  for (let i = 0; i < m.length; i++) h = m.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${Math.abs(h) % 360}, 55%, 45%)`;
}
function getGoalCompletion(d) {
  return d.strategy_goal_completion || getGoalCompletion(d) || {};
}
function itemStr(items) {
  return Object.entries(items).filter(([,v])=>v>0).map(([k,v])=>`${ITEM_EMOJI[k]||''} ${v} ${k}`).join(', ') || 'nothing';
}

let allData = [], eloRatings = {}, matchLog = [], activeScenario = 'all';
let currentRun = null, currentStep = 0, inventories = [], orderBook = [], playing = false;
let goalHistory = []; // [{step, completions: [per-agent completion]}]

// ---- Data ----
async function loadData() {
  // Load both benchmark and arena results
  let benchData = [], arenaData = [];
  try {
    const r = await fetch('results.json');
    benchData = (await r.json()).filter(d => !d.error);
  } catch { benchData = []; }
  try {
    const r = await fetch('arena/results.json');
    arenaData = (await r.json()).filter(d => !d.error);
  } catch { arenaData = []; }
  allData = [...benchData, ...arenaData];

  // Merge ELO ratings from both sources
  eloRatings = {};
  try {
    const r2 = await fetch('elo_ratings.json');
    Object.assign(eloRatings, await r2.json());
  } catch {}
  try {
    const r2 = await fetch('arena/elo_ratings.json');
    Object.assign(eloRatings, await r2.json());
  } catch {}

  // Merge match logs
  let benchLog = [], arenaLog = [];
  try {
    const r3 = await fetch('match_log.json');
    benchLog = await r3.json();
  } catch {}
  try {
    const r3 = await fetch('arena/match_log.json');
    arenaLog = await r3.json();
  } catch {}
  matchLog = [...benchLog, ...arenaLog];

  renderOverview();
  buildRunSelector();
}

// ---- Tabs ----
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === name));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === `tab-${name}`));
  if (name === 'replays' && allData.length && !currentRun) selectRun(0);
}

// ---- Overview ----
function filtered() {
  return activeScenario === 'all' ? allData : allData.filter(d => d.scenario === activeScenario);
}

function renderOverview() {
  renderStats();
  renderFilters();
  renderChart();
  renderEloChart();
  renderLeaderboard();
  renderHistory();
}

function renderStats() {
  const d = allData;
  const el = document.getElementById('statsRow');
  if (!d.length) { el.innerHTML = ''; return; }
  const models = new Set();
  d.forEach(r => {
    const mgc = r.model_goal_completion || {};
    Object.keys(mgc).forEach(m => models.add(m));
  });
  const avgGoal = d.reduce((a,x) => a + (x.avg_goal_completion || 0), 0) / d.length;
  const avgTrades = d.reduce((a,x) => a + (x.num_trades || 0), 0) / d.length;
  const topElo = Object.entries(eloRatings).sort((a,b) => b[1]-a[1]);
  const topEloStr = topElo.length ? `${topElo[0][0]} ${Math.round(topElo[0][1])}` : '--';
  el.innerHTML = `
    <div class="stat-card"><div class="val">${d.length}</div><div class="lbl">matches</div></div>
    <div class="stat-card"><div class="val">${models.size}</div><div class="lbl">models</div></div>
    <div class="stat-card"><div class="val">${topEloStr}</div><div class="lbl">top elo</div></div>
    <div class="stat-card"><div class="val">${(avgGoal*100).toFixed(0)}%</div><div class="lbl">avg goal</div></div>`;
}

function renderFilters() {
  const scenarios = ['all', ...new Set(allData.map(d => d.scenario))];
  const el = document.getElementById('scenarioFilters');
  el.innerHTML = '';
  scenarios.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (s === activeScenario ? ' active' : '');
    btn.textContent = s;
    btn.onclick = () => { activeScenario = s; renderOverview(); };
    el.appendChild(btn);
  });
}

function renderChart() {
  const data = filtered();
  const svg = document.getElementById('chart');
  svg.innerHTML = '';
  if (!data.length) {
    svg.innerHTML = '<text x="470" y="140" text-anchor="middle" fill="#9ca3af" font-size="13">no data yet</text>';
    return;
  }

  const W=940,H=280,p={t:16,r:24,b:36,l:50};
  const pw=W-p.l-p.r, ph=H-p.t-p.b;
  const xS = i => p.l + (i / Math.max(data.length-1, 1)) * pw;
  const yS = v => p.t + ph - v * ph;

  // Grid
  for(let i=0;i<=4;i++){
    const y=p.t+(i/4)*ph, v=1-(i/4);
    svg.innerHTML+=`<line x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    svg.innerHTML+=`<text x="${p.l-6}" y="${y+3}" text-anchor="end" fill="#9ca3af" font-size="9">${v.toFixed(2)}</text>`;
  }
  svg.innerHTML+=`<text x="${p.l+pw/2}" y="${H-4}" text-anchor="middle" fill="#9ca3af" font-size="10">run</text>`;

  // Points — one per model per run
  data.forEach((d,i) => {
    const cx = xS(i);
    const mgc = getGoalCompletion(d) || {};
    Object.entries(mgc).forEach(([model, score]) => {
      const cy = yS(score);
      const c = gc(model);
      const t = `${d.scenario}: ${model} = ${(score*100).toFixed(0)}% goal`;
      svg.innerHTML += `<circle cx="${cx}" cy="${cy}" r="5" fill="${c}" opacity="0.85"><title>${t}</title></circle>`;
    });
  });

  // Legend
  const models = [...new Set(allData.flatMap(d => Object.keys(getGoalCompletion(d) || {})))];
  models.forEach((m,i) => {
    const lx = p.l + i * 80;
    svg.innerHTML += `<circle cx="${lx}" cy="${H-20}" r="3.5" fill="${gc(m)}"/>`;
    svg.innerHTML += `<text x="${lx+7}" y="${H-17}" fill="#6b7280" font-size="9">${m}</text>`;
  });
}

function renderEloChart() {
  const svg = document.getElementById('eloChart');
  svg.innerHTML = '';
  if (!matchLog.length) {
    svg.innerHTML = '<text x="470" y="150" text-anchor="middle" fill="#9ca3af" font-size="13">no matches yet</text>';
    return;
  }

  // Build ELO history: for each contestant, track rating after each match
  const history = {};  // contestant -> [{match_idx, elo}]
  matchLog.forEach((m, idx) => {
    const after = m.elo_after || {};
    Object.entries(after).forEach(([name, elo]) => {
      if (!history[name]) history[name] = [];
      history[name].push({ idx, elo });
    });
  });

  const contestants = Object.keys(history);
  if (!contestants.length) {
    svg.innerHTML = '<text x="470" y="150" text-anchor="middle" fill="#9ca3af" font-size="13">no elo data</text>';
    return;
  }

  const W = 940, H = 300, p = { t: 20, r: 140, b: 36, l: 50 };
  const pw = W - p.l - p.r, ph = H - p.t - p.b;

  // Find ELO range
  let minElo = 1500, maxElo = 1500;
  contestants.forEach(c => {
    history[c].forEach(h => {
      minElo = Math.min(minElo, h.elo);
      maxElo = Math.max(maxElo, h.elo);
    });
  });
  const eloPad = Math.max((maxElo - minElo) * 0.1, 20);
  minElo = Math.floor((minElo - eloPad) / 10) * 10;
  maxElo = Math.ceil((maxElo + eloPad) / 10) * 10;

  const totalMatches = matchLog.length;
  const xS = i => p.l + (i / Math.max(totalMatches - 1, 1)) * pw;
  const yS = v => p.t + ph - ((v - minElo) / (maxElo - minElo)) * ph;

  // Grid lines
  const eloStep = Math.max(Math.round((maxElo - minElo) / 5 / 10) * 10, 10);
  for (let v = Math.ceil(minElo / eloStep) * eloStep; v <= maxElo; v += eloStep) {
    const y = yS(v);
    svg.innerHTML += `<line x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    svg.innerHTML += `<text x="${p.l-6}" y="${y+3}" text-anchor="end" fill="#9ca3af" font-size="9">${v}</text>`;
  }
  // 1500 baseline
  const y1500 = yS(1500);
  svg.innerHTML += `<line x1="${p.l}" y1="${y1500}" x2="${W-p.r}" y2="${y1500}" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>`;

  svg.innerHTML += `<text x="${p.l+pw/2}" y="${H-4}" text-anchor="middle" fill="#9ca3af" font-size="10">match</text>`;

  // Draw lines for each contestant
  contestants.forEach(c => {
    const pts = history[c];
    const color = gc(c);
    if (pts.length < 2) {
      const pt = pts[0];
      svg.innerHTML += `<circle cx="${xS(pt.idx)}" cy="${yS(pt.elo)}" r="4" fill="${color}" opacity="0.85"><title>${c}: ${pt.elo.toFixed(0)}</title></circle>`;
      return;
    }

    // Draw path
    const pathParts = pts.map((pt, i) => `${i === 0 ? 'M' : 'L'}${xS(pt.idx).toFixed(1)},${yS(pt.elo).toFixed(1)}`);
    svg.innerHTML += `<path d="${pathParts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" opacity="0.8"/>`;

    // End dot with current ELO
    const last = pts[pts.length - 1];
    svg.innerHTML += `<circle cx="${xS(last.idx)}" cy="${yS(last.elo)}" r="4" fill="${color}"><title>${c}: ${last.elo.toFixed(0)}</title></circle>`;
  });

  // Legend (right side, sorted by final ELO)
  const sorted = contestants.map(c => ({
    name: c,
    elo: history[c][history[c].length - 1].elo
  })).sort((a, b) => b.elo - a.elo);

  sorted.forEach((s, i) => {
    const ly = p.t + 8 + i * 16;
    const lx = W - p.r + 10;
    svg.innerHTML += `<circle cx="${lx}" cy="${ly}" r="3.5" fill="${gc(s.name)}"/>`;
    svg.innerHTML += `<text x="${lx+8}" y="${ly+3.5}" fill="#6b7280" font-size="9">${s.name} (${s.elo.toFixed(0)})</text>`;
  });
}

function renderLeaderboard() {
  const data = filtered(), el = document.getElementById('leaderboard');
  if (!data.length) { el.innerHTML = '<tr><td class="empty-state" colspan="6">no data</td></tr>'; return; }

  const s = {};
  data.forEach(d => {
    const mgc = getGoalCompletion(d) || {};
    Object.entries(mgc).forEach(([model, score]) => {
      if (!s[model]) s[model] = { scores: [], trades: [], invalids: [] };
      s[model].scores.push(score);
      s[model].trades.push(d.num_trades || 0);
      s[model].invalids.push(d.invalid_rate || 0);
    });
  });

  // Count wins/losses/draws from match log
  function wld(model) {
    let w=0, l=0, d=0;
    matchLog.forEach(m => {
      if (m.model_a !== model && m.model_b !== model) return;
      if (m.winner === 'draw') d++;
      else if (m.winner === model) w++;
      else l++;
    });
    return {w,l,d};
  }

  const avg = a => a.reduce((x,y) => x+y, 0) / a.length;
  const rows = Object.entries(s).map(([m,v]) => ({
    m, elo: eloRatings[m] || 1500, sc: avg(v.scores), tr: avg(v.trades),
    inv: avg(v.invalids)*100, n: v.scores.length, ...wld(m)
  })).sort((a,b) => b.elo - a.elo);

  // Parse contestant name into strategy + model columns
  function parseContestant(name) {
    const parts = name.split(':');
    if (parts.length === 2) return { strategy: parts[0], model: parts[1] };
    return { strategy: '', model: name };
  }

  const hasStrategies = rows.some(r => r.m.includes(':'));
  const stratHeader = hasStrategies ? '<th>strategy</th><th>model</th>' : '<th>contestant</th>';
  el.innerHTML = `<thead><tr>${stratHeader}<th class="r">elo</th><th class="r">W-L-D</th><th class="r">goal %</th><th class="r">invalid %</th><th class="r">matches</th></tr></thead>
  <tbody>${rows.map(r => {
    const p = parseContestant(r.m);
    const nameCell = hasStrategies
      ? `<td><span class="tag" style="background:${gc(r.m)}18;color:${gc(r.m)}">${p.strategy}</span></td><td><span class="tag" style="background:${gc(p.model)}18;color:${gc(p.model)}">${p.model}</span></td>`
      : `<td><span class="tag" style="background:${gc(r.m)}18;color:${gc(r.m)}">${r.m}</span></td>`;
    return `<tr>
    ${nameCell}
    <td class="r" style="font-weight:600">${Math.round(r.elo)}</td>
    <td class="r">${r.w}-${r.l}-${r.d}</td>
    <td class="r">${(r.sc*100).toFixed(1)}%</td>
    <td class="r">${r.inv.toFixed(1)}%</td>
    <td class="r">${r.n}</td></tr>`;
  }).join('')}</tbody>`;
}

function renderHistory() {
  const data = filtered(), el = document.getElementById('history');
  if (!data.length) { el.innerHTML = '<tr><td class="empty-state" colspan="6">no data</td></tr>'; return; }

  el.innerHTML = `<thead><tr><th>#</th><th>scenario</th><th>result</th><th class="r">goal %</th><th class="r">trades</th><th class="r">time</th></tr></thead>
  <tbody>${data.map((d,i) => {
    const mgc = getGoalCompletion(d) || {};
    const models = Object.keys(mgc);
    let resultStr = '';
    if (models.length === 2) {
      const [a, b] = models;
      const sa = mgc[a], sb = mgc[b];
      const diff = Math.abs(sa - sb);
      if (diff < 0.02) {
        resultStr = `<span class="tag" style="background:#fbbf2418;color:#fbbf24">draw</span> `;
      } else {
        const winner = sa > sb ? a : b;
        resultStr = `<span class="tag" style="background:${gc(winner)}18;color:${gc(winner)}">${winner} wins</span> `;
      }
    }
    resultStr += Object.entries(mgc).map(([m,s]) =>
      `<span class="tag" style="background:${gc(m)}18;color:${gc(m)}">${m}: ${(s*100).toFixed(0)}%</span>`
    ).join(' ');
    return `<tr class="clickable" onclick="openReplay(${allData.indexOf(d)})">
    <td>${d.run_id}</td><td>${d.scenario}</td><td>${resultStr}</td>
    <td class="r">${((d.avg_goal_completion||0)*100).toFixed(0)}%</td>
    <td class="r">${d.num_trades||0}</td>
    <td class="r">${(d.elapsed_seconds||0).toFixed(1)}s</td></tr>`;
  }).join('')}</tbody>`;
}

// ---- Replays ----
function buildRunSelector() {
  const el = document.getElementById('runSelector');
  el.innerHTML = '';
  const runs = allData.filter(d => d.history && d.history.length);
  runs.forEach((run, i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (currentRun === run ? ' active' : '');
    const models = [...new Set(run.model_assignments || [])].join('/');
    btn.textContent = `#${run.run_id} ${run.scenario} (${models})`;
    btn.onclick = () => selectRun(i);
    el.appendChild(btn);
  });
}

function selectRun(idx) {
  const runs = allData.filter(d => d.history && d.history.length);
  if (!runs[idx]) return;
  if (goalChartInstance) { goalChartInstance.destroy(); goalChartInstance = null; }
  currentRun = runs[idx];
  currentStep = 0;
  playing = false;
  inventories = (currentRun.initial_inventories || []).map(inv => ({...inv}));
  orderBook = [];
  const targets = currentRun.targets || [];
  goalHistory = [{
    step: 0,
    completions: inventories.map((inv, i) => computeCompletion(inv, targets[i] || {}))
  }];
  buildRunSelector();
  renderAgents();
  renderOrderBook();
  renderGoalChart();
  document.getElementById('eventLog').innerHTML = '';
  updateStep();
  renderSummary(false);
}

function renderAgents() {
  if (!currentRun) return;
  const el = document.getElementById('agentsGrid');
  const n = currentRun.model_assignments ? currentRun.model_assignments.length : 0;
  const targets = currentRun.targets || [];

  const strats = currentRun.strategy_assignments || [];
  el.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const model = currentRun.model_assignments[i];
    const strat = strats[i] || '';
    const contestant = strat && strat !== model ? strat : model;
    const inv = inventories[i] || {};
    const target = targets[i] || {};
    const completion = computeCompletion(inv, target);
    const color = gc(contestant);
    const emoji = AGENT_EMOJI[i % AGENT_EMOJI.length];
    const stratLabel = strat && strat !== model ? `<div class="agent-strat" style="color:${color}">${strat}</div>` : '';

    el.innerHTML += `
      <div class="agent-card" id="agent-card-${i}">
        <div class="sprite" style="background:${color}11;border-color:${color}44">${emoji}</div>
        <div class="agent-name">Trader ${i}</div>
        <div class="agent-model" style="color:${gc(model)}">${model}</div>
        ${stratLabel}
        <div class="goal-bar"><div class="goal-fill" id="goal-${i}" style="width:${completion*100}%;background:${color}"></div></div>
        <div class="goal-pct" id="goalpct-${i}">${(completion*100).toFixed(0)}% goal</div>
        <div class="inventory" id="inv-${i}">
          ${Object.entries(inv).filter(([,v])=>v>0).map(([k,v])=>`<span class="inv-item">${ITEM_EMOJI[k]||''} ${k}:${v}</span>`).join('')}
        </div>
      </div>`;
  }
}

function computeCompletion(inv, target) {
  if (!target || Object.keys(target).length === 0) return 1;
  let scores = [];
  for (const [item, needed] of Object.entries(target)) {
    if (needed > 0) {
      scores.push(Math.min((inv[item] || 0) / needed, 1.0));
    }
  }
  return scores.length ? scores.reduce((a,b)=>a+b,0) / scores.length : 1;
}

function updateAgents() {
  if (!currentRun) return;
  const n = currentRun.model_assignments ? currentRun.model_assignments.length : 0;
  const targets = currentRun.targets || [];

  for (let i = 0; i < n; i++) {
    const inv = inventories[i] || {};
    const target = targets[i] || {};
    const completion = computeCompletion(inv, target);
    const model = currentRun.model_assignments[i];
    const color = gc(model);

    const invEl = document.getElementById(`inv-${i}`);
    if (invEl) {
      invEl.innerHTML = Object.entries(inv).filter(([,v])=>v>0)
        .map(([k,v])=>`<span class="inv-item">${ITEM_EMOJI[k]||''} ${k}:${v}</span>`).join('');
    }
    const goalEl = document.getElementById(`goal-${i}`);
    if (goalEl) goalEl.style.width = `${completion*100}%`;
    const pctEl = document.getElementById(`goalpct-${i}`);
    if (pctEl) pctEl.textContent = `${(completion*100).toFixed(0)}% goal`;
  }
}

function renderOrderBook() {
  const el = document.getElementById('obEntries');
  if (!orderBook.length) {
    el.innerHTML = '<span style="color:var(--text3);font-size:0.7rem">empty</span>';

  }

    `<div class="ob-entry">[#${o.id}] Trader ${o.poster} gives ${itemStr(o.give)} for ${itemStr(o.want)}</div>`

let goalChartInstance = null;
function renderGoalChart() {
  const canvas = document.getElementById('goalChart');
  if (!canvas || !currentRun) return;

  const n = currentRun.model_assignments ? currentRun.model_assignments.length : 0;
  const strats = currentRun.strategy_assignments || [];
  const labels = goalHistory.map(h => h.step);

  const datasets = [];
  for (let i = 0; i < n; i++) {
    const model = currentRun.model_assignments[i];
    const strat = strats[i] || '';
    const contestant = strat && strat !== model ? strat : model;
    const color = gc(contestant);
    const agentLabel = `T${i} ${contestant}` + (strat && strat !== model ? ` (${model})` : '');

    datasets.push({
      label: agentLabel,
      data: goalHistory.map(h => (h.completions[i] * 100).toFixed(1)),
      borderColor: color,
      backgroundColor: color + '18',
      borderWidth: 2,
      pointRadius: goalHistory.length > 30 ? 0 : 3,
      pointHoverRadius: 5,
      tension: 0.3,
      fill: false,
    });
  }

  if (goalChartInstance) {
    goalChartInstance.data.labels = labels;
    goalChartInstance.data.datasets = datasets;
    goalChartInstance.update('none');
    return;
  }

  goalChartInstance = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 10, family: "'SF Mono', monospace" }, boxWidth: 12, padding: 8 }
        },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}%`
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: 'step', font: { size: 10 } },
          grid: { color: '#e5e7eb' },
          ticks: { font: { size: 9 } }
        },
        y: {
          min: 0, max: 100,
          title: { display: true, text: 'goal %', font: { size: 10 } },
          grid: { color: '#e5e7eb' },
          ticks: { font: { size: 9 }, callback: v => v + '%' }
        }
      }
    }
  });
}

function renderEvent(h) {
  const log = document.getElementById('eventLog');
  const model = currentRun.model_assignments[h.agent];
  const color = gc(model);

  let actionClass = 'ev-pass';
  let detail = h.message || '';

  if (h.action === 'post_offer') {
    actionClass = h.invalid ? 'ev-invalid' : 'ev-post';
    const inv = h.invalid ? ' [INVALID]' : '';
    detail = `give ${itemStr(h.give||{})} for ${itemStr(h.want||{})}${inv}`;
  } else if (h.action === 'accept_offer') {
    actionClass = h.invalid ? 'ev-invalid' : 'ev-accept';
    const inv = h.invalid ? ' [INVALID]' : '';
    detail = `accepted offer #${h.offer_id||'?'}${inv}`;
    if (h.trade) {
      detail += ` (${itemStr(h.trade.give||{})} <-> ${itemStr(h.trade.want||{})})`;
    }
  }

  const div = document.createElement('div');
  div.className = 'event';
  const label = h.contestant && h.contestant !== model ? `${h.contestant} (${model})` : model;
  div.innerHTML = `
    <span class="ev-round">R${h.round}</span>
    <span class="ev-agent" style="color:${color}">T${h.agent} ${label}</span>
    <span class="ev-action ${actionClass}">${h.action.replace(/_/g,' ')}</span>
    <span class="ev-detail">${detail}</span>`;
  const reasoning = h.reasoning || '';
  const message = h.message || '';
  const thoughtText = reasoning ? `${reasoning}\n\nAction message: ${message}` : message;
  if (thoughtText) {
    div.onclick = () => {
      log.querySelectorAll('.event.selected').forEach(e => e.classList.remove('selected'));
      div.classList.add('selected');
      showReasoning(h.agent, label, color, thoughtText);
    };
  }
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  // Auto-show reasoning for latest event
  if (thoughtText) {
    log.querySelectorAll('.event.selected').forEach(e => e.classList.remove('selected'));
    div.classList.add('selected');
    showReasoning(h.agent, label, color, thoughtText);
  }
}

function renderMarkdown(text) {
  // Simple markdown: **bold**, *italic*, `code`, - lists, numbered lists, paragraphs
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>');
  // Split into paragraphs, handle lists
  const lines = html.split('\n');
  let out = '', inList = false, listType = '';
  for (const line of lines) {
    const trimmed = line.trim();
    const ulMatch = trimmed.match(/^[-*]\s+(.+)/);
    const olMatch = trimmed.match(/^\d+[.)]\s+(.+)/);
    if (ulMatch) {
      if (!inList || listType !== 'ul') { if (inList) out += `</${listType}>`; out += '<ul>'; inList = true; listType = 'ul'; }
      out += `<li>${ulMatch[1]}</li>`;
    } else if (olMatch) {
      if (!inList || listType !== 'ol') { if (inList) out += `</${listType}>`; out += '<ol>'; inList = true; listType = 'ol'; }
      out += `<li>${olMatch[1]}</li>`;
    } else {
      if (inList) { out += `</${listType}>`; inList = false; }
      if (trimmed) out += `<p>${trimmed}</p>`;
    }
  }
  if (inList) out += `</${listType}>`;
  return out;
}

function showReasoning(agentIdx, label, color, text) {
  const agentEl = document.getElementById('rpAgent');
  const textEl = document.getElementById('rpText');
  agentEl.style.color = color;
  agentEl.textContent = `Trader ${agentIdx} (${label})`;
  textEl.innerHTML = renderMarkdown(text);
}

function applyAction(h) {
  if (h.action === 'post_offer' && !h.invalid) {
    orderBook.push({
      id: h.offer_id,
      poster: h.agent,
      give: {...(h.give || {})},
      want: {...(h.want || {})},
    });
  } else if (h.action === 'accept_offer' && !h.invalid && h.trade) {
    const t = h.trade;
    // Execute trade on inventories
    for (const [item, qty] of Object.entries(t.give || {})) {
      inventories[t.poster][item] = (inventories[t.poster][item] || 0) - qty;
      inventories[t.accepter][item] = (inventories[t.accepter][item] || 0) + qty;
    }
    for (const [item, qty] of Object.entries(t.want || {})) {
      inventories[t.accepter][item] = (inventories[t.accepter][item] || 0) - qty;
      inventories[t.poster][item] = (inventories[t.poster][item] || 0) + qty;
    }
    // Remove from order book
    orderBook = orderBook.filter(o => o.id !== h.offer_id);
    // Remove stale offers
    orderBook = orderBook.filter(o => {
      for (const [item, qty] of Object.entries(o.give)) {
        if ((inventories[o.poster][item] || 0) < qty) return false;
      }
      return true;
    });
  }
}

function unapplyAction(h) {
  if (h.action === 'post_offer' && !h.invalid) {
    orderBook = orderBook.filter(o => o.id !== h.offer_id);
  } else if (h.action === 'accept_offer' && !h.invalid && h.trade) {
    const t = h.trade;
    // Reverse trade
    for (const [item, qty] of Object.entries(t.give || {})) {
      inventories[t.poster][item] = (inventories[t.poster][item] || 0) + qty;
      inventories[t.accepter][item] = (inventories[t.accepter][item] || 0) - qty;
    }
    for (const [item, qty] of Object.entries(t.want || {})) {
      inventories[t.accepter][item] = (inventories[t.accepter][item] || 0) + qty;
      inventories[t.poster][item] = (inventories[t.poster][item] || 0) - qty;
    }
    // Re-add to order book
    orderBook.push({
      id: h.offer_id,
      poster: t.poster,
      give: {...(t.give || {})},
      want: {...(t.want || {})},
    });
  }
}

function stepForward() {
  if (!currentRun || currentStep >= currentRun.history.length) return;
  const h = currentRun.history[currentStep];
  currentStep++;
  applyAction(h);
  updateAgents();
  renderOrderBook();
  renderEvent(h);
  // Track goal completion
  const targets = currentRun.targets || [];
  goalHistory.push({
    step: currentStep,
    completions: inventories.map((inv, i) => computeCompletion(inv, targets[i] || {}))
  });
  renderGoalChart();
  updateStep();
  if (currentStep >= currentRun.history.length) renderSummary(true);
}

function stepBack() {
  if (!currentRun || currentStep <= 0) return;
  currentStep--;
  const h = currentRun.history[currentStep];
  unapplyAction(h);
  updateAgents();
  renderOrderBook();
  const log = document.getElementById('eventLog');
  if (log.lastChild) log.removeChild(log.lastChild);
  if (goalHistory.length > 1) goalHistory.pop();
  renderGoalChart();
  updateStep();
  renderSummary(false);
}

function restart() {
  if (!currentRun) return;
  if (goalChartInstance) { goalChartInstance.destroy(); goalChartInstance = null; }
  playing = false;
  currentStep = 0;
  inventories = (currentRun.initial_inventories || []).map(inv => ({...inv}));
  orderBook = [];
  // Record initial goal state
  const targets = currentRun.targets || [];
  goalHistory = [{
    step: 0,
    completions: inventories.map((inv, i) => computeCompletion(inv, targets[i] || {}))
  }];
  renderAgents();
  renderOrderBook();
  renderGoalChart();
  document.getElementById('eventLog').innerHTML = '';
  document.getElementById('rpText').innerHTML = '<span class="rp-empty">Click an event or step through the replay</span>';
  document.getElementById('rpAgent').textContent = '';
  updateStep();
  renderSummary(false);
}

async function playAll() {
  if (!currentRun || playing) return;
  playing = true;
  while (currentStep < currentRun.history.length && playing) {
    stepForward();
    await new Promise(r => setTimeout(r, 500));
  }
  playing = false;
}

function updateStep() {
  const n = currentRun ? currentRun.history.length : 0;
  document.getElementById('stepDisplay').textContent = `${currentStep} / ${n}`;
}

function renderSummary(show) {
  const el = document.getElementById('summary');
  if (!show || !currentRun) { el.innerHTML = ''; return; }
  const r = currentRun;
  const mgc = r.model_goal_completion || {};
  const modelParts = Object.entries(mgc).map(([m,s]) =>
    `<div><div class="s-val" style="color:${gc(m)}">${(s*100).toFixed(0)}%</div><div class="s-lbl">${m} goal</div></div>`
  ).join('');
  el.innerHTML = `
    <div><div class="s-val">${((r.avg_goal_completion||0)*100).toFixed(0)}%</div><div class="s-lbl">avg goal</div></div>
    ${modelParts}
    <div><div class="s-val">${r.num_trades||0}</div><div class="s-lbl">trades</div></div>
    <div><div class="s-val">${(r.elapsed_seconds||0).toFixed(1)}s</div><div class="s-lbl">time</div></div>`;
}

loadData();
setInterval(loadData, 5000);

// ---- Live match streaming ----
const LIVE_FILES = ['arena/live_gold_rush.json', 'arena/live_water_crisis.json', 'arena/live_spice_wars.json'];
let liveMatches = {}; // scenario -> data
let activeLive = null; // which scenario we're watching
let liveStep = 0;

async function pollLive() {
  let anyLive = false;
  for (const f of LIVE_FILES) {
    try {
      const r = await fetch(f + '?t=' + Date.now());
      const data = await r.json();
      if (data.status === 'running' && data.history && data.history.length) {
        liveMatches[data.scenario] = data;
        anyLive = true;
      }
    } catch {}
  }
  updateLiveBadges();

  // Auto-advance if watching a live match
  if (currentRun && currentRun._live && activeLive && liveMatches[activeLive]) {
    const data = liveMatches[activeLive];
    const isNew = data.history.length < liveStep;
    if (isNew) {
      liveStep = 0;
      watchLive(activeLive);
    } else if (data.history.length > liveStep) {
      currentRun.history = data.history;
      currentRun.agent_results = data.agent_results;
      currentRun.trades = data.trades;
      const targets = currentRun.targets || [];
      for (let i = liveStep; i < data.history.length; i++) {
        const h = data.history[i];
        applyAction(h);
        updateAgents();
        renderOrderBook();
        renderEvent(h);
        goalHistory.push({
          step: goalHistory.length,
          completions: inventories.map((inv, j) => computeCompletion(inv, targets[j] || {}))
        });
        renderGoalChart();
      }
      liveStep = data.history.length;
      currentStep = liveStep;
      updateStep();
    }
  }
}

function updateLiveBadges() {
  const controls = document.getElementById('replayControls');
  // Remove old badges
  controls.querySelectorAll('.live-btn').forEach(b => b.remove());
  // Add one per live match
  for (const [scenario, data] of Object.entries(liveMatches)) {
    const btn = document.createElement('button');
    btn.className = 'ctrl-btn live-btn';
    const isActive = activeLive === scenario && currentRun && currentRun._live;
    btn.style.cssText = isActive
      ? 'background:#dc2626;color:white;border-color:#dc2626;font-weight:700;animation:pulse 2s infinite'
      : 'background:#fef2f2;color:#dc2626;border-color:#fca5a5;font-weight:600';
    btn.textContent = `LIVE ${scenario} (${data.history.length})`;
    btn.onclick = () => watchLive(scenario);
    controls.appendChild(btn);
  }
}

function watchLive(scenario) {
  const data = liveMatches[scenario];
  if (!data) return;
  if (goalChartInstance) { goalChartInstance.destroy(); goalChartInstance = null; }
  activeLive = scenario;
  currentRun = Object.assign({}, data, {_live: true});
  currentStep = 0;
  liveStep = 0;
  playing = false;
  inventories = (currentRun.initial_inventories || []).map(inv => ({...inv}));
  orderBook = [];
  const targets = currentRun.targets || [];
  goalHistory = [{step:0, completions: inventories.map((inv,i) => computeCompletion(inv, targets[i]||{}))}];
  renderAgents();
  renderOrderBook();
  renderGoalChart();
  document.getElementById('eventLog').innerHTML = '';
  document.getElementById('rpText').innerHTML = '<span class="rp-empty">Watching live...</span>';
  document.getElementById('rpAgent').textContent = '';
  for (let i = 0; i < data.history.length; i++) {
    const h = data.history[i];
    applyAction(h);
    updateAgents();
    renderOrderBook();
    renderEvent(h);
    goalHistory.push({
      step: goalHistory.length,
      completions: inventories.map((inv,j) => computeCompletion(inv, targets[j]||{}))
    });
    renderGoalChart();
  }
  liveStep = data.history.length;
  currentStep = liveStep;
  updateStep();
  updateLiveBadges();
  switchTab('replays');
}

setInterval(pollLive, 3000);
pollLive();
</script>
